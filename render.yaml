services:
  - type: web
    name: wedify-backend
    env: python
    region: ohio
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn wedify_project.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-file -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedify-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.render.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

databases:
  - name: wedify-db
    plan: free
    region: ohio
